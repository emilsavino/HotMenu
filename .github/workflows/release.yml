name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *-* ]]; then
            echo "prerelease=--prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=" >> "$GITHUB_OUTPUT"
          fi

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Set app version
        run: ./scripts/set-version.sh "${{ steps.version.outputs.version }}"

      - name: Build release artifacts
        run: ./scripts/build-release.sh "${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PRERELEASE="${{ steps.version.outputs.prerelease }}"
          if ! gh release create "$TAG" --generate-notes $PRERELEASE release/*; then
            gh release upload "$TAG" release/* --clobber
          fi
